<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield outer -->
  <path d="M256 28 L462 120 C462 120 472 310 256 488 C40 310 50 120 50 120 Z"
        fill="url(#shieldGrad)" stroke="#60A5FA" stroke-width="4"/>

  <!-- Shield inner -->
  <path d="M256 60 L432 140 C432 140 440 300 256 456 C72 300 80 140 80 140 Z"
        fill="url(#innerGrad)"/>

  <!-- Eye shape - outer -->
  <path d="M130 256 Q256 160 382 256 Q256 352 130 256 Z"
        fill="none" stroke="#60A5FA" stroke-width="6" filter="url(#glow)"/>

  <!-- Eye iris -->
  <circle cx="256" cy="256" r="52" fill="url(#eyeGrad)" opacity="0.9"/>

  <!-- Eye pupil -->
  <circle cx="256" cy="256" r="24" fill="#0F172A"/>

  <!-- Eye highlight -->
  <circle cx="244" cy="244" r="10" fill="#ffffff" opacity="0.7"/>

  <!-- Subtle scan lines for tech feel -->
  <line x1="160" y1="220" x2="352" y2="220" stroke="#60A5FA" stroke-width="1.5" opacity="0.2"/>
  <line x1="140" y1="240" x2="372" y2="240" stroke="#60A5FA" stroke-width="1.5" opacity="0.15"/>
  <line x1="140" y1="272" x2="372" y2="272" stroke="#60A5FA" stroke-width="1.5" opacity="0.15"/>
  <line x1="160" y1="292" x2="352" y2="292" stroke="#60A5FA" stroke-width="1.5" opacity="0.2"/>
</svg>
